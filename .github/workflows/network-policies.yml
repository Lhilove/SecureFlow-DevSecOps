name: NetworkPolicy Enforcement

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  network-policy-test:
    name: Verify Network Segmentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # kind's default CNI (kindnet) does NOT enforce NetworkPolicies.
      # Calico must be used instead, so policies actually take effect,
      # otherwise this whole test would silently pass without proving
      # anything.
      - name: Create kind Cluster (no default CNI)
        uses: helm/kind-action@v1
        with:
          cluster_name: secureflow-netpol
          config: infra/kubernetes/network-policies/ci/kind-no-cni-config.yaml
          wait: 0s

      - name: Install Calico CNI
        run: |
          kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.28.0/manifests/calico.yaml
          kubectl -n kube-system wait --for=condition=available --timeout=180s deployment/calico-kube-controllers

      - name: Wait for Nodes Ready
        run: kubectl wait --for=condition=ready node --all --timeout=120s

      - name: Build Service Images
        run: |
          docker build -t secureflow/auth-service:latest services/auth-service
          docker build -t secureflow/transaction-service:latest services/transaction-service
          docker build -t secureflow/frontend:latest services/frontend

      - name: Load Images into kind
        run: |
          kind load docker-image secureflow/auth-service:latest --name secureflow-netpol
          kind load docker-image secureflow/transaction-service:latest --name secureflow-netpol
          kind load docker-image secureflow/frontend:latest --name secureflow-netpol

      - name: Deploy Application
        run: |
          kubectl apply -k infra/kubernetes/base
          for deploy in auth-service transaction-service frontend; do
            kubectl -n secureflow patch deployment "$deploy" --type=json \
              -p='[{"op":"add","path":"/spec/template/spec/containers/0/imagePullPolicy","value":"IfNotPresent"}]'
          done
          kubectl -n secureflow wait --for=condition=available --timeout=180s \
            deployment/auth-db deployment/transaction-db \
            deployment/auth-service deployment/transaction-service deployment/frontend

      - name: Apply NetworkPolicies
        run: kubectl apply -f infra/kubernetes/network-policies/

      - name: Wait for Policies to Take Effect
        run: sleep 15

      - name: "TEST 1 - Allowed: frontend-labeled pod can reach auth-service"
        run: |
          kubectl -n secureflow run test-frontend --rm -i --restart=Never \
            --image=busybox:1.36 --labels="svc=frontend" --timeout=30s -- \
            timeout 5 nc -zv auth-service 5001

      - name: "TEST 2 - Blocked: auth-service-labeled pod must NOT reach transaction-db"
        run: |
          if kubectl -n secureflow run test-auth --rm -i --restart=Never \
            --image=busybox:1.36 --labels="svc=auth-service" --timeout=30s -- \
            timeout 5 nc -zv transaction-db 5432; then
            echo "FAIL: auth-service reached transaction-db directly — network segmentation is NOT working."
            exit 1
          else
            echo "PASS: auth-service correctly blocked from reaching transaction-db."
          fi

      - name: "TEST 3 - Blocked: frontend-labeled pod must NOT reach auth-db directly"
        run: |
          if kubectl -n secureflow run test-frontend-2 --rm -i --restart=Never \
            --image=busybox:1.36 --labels="svc=frontend" --timeout=30s -- \
            timeout 5 nc -zv auth-db 5432; then
            echo "FAIL: frontend reached auth-db directly — network segmentation is NOT working."
            exit 1
          else
            echo "PASS: frontend correctly blocked from reaching auth-db."
          fi

      - name: "TEST 4 - Blocked: unlabeled pod must NOT reach anything"
        run: |
          if kubectl -n secureflow run test-unlabeled --rm -i --restart=Never \
            --image=busybox:1.36 --timeout=30s -- \
            timeout 5 nc -zv auth-service 5001; then
            echo "FAIL: an unlabeled pod reached auth-service — default-deny is NOT working."
            exit 1
          else
            echo "PASS: unlabeled pod correctly blocked by default-deny-all."
          fi

      - name: Show NetworkPolicies (on failure)
        if: failure()
        run: kubectl -n secureflow get networkpolicies -o wide