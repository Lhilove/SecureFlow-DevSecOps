name: Image Signing

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write   # required for Cosign keyless (OIDC) signing

jobs:
  sign:
    name: Build, Push & Sign (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - transaction-service
          - frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Lowercase Repository Owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.name }}/secureflow-${{ matrix.service }}:${{ github.sha }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.2

      - name: Sign Image (Keyless)
        run: |
          cosign sign --yes \
            ghcr.io/${{ steps.owner.outputs.name }}/secureflow-${{ matrix.service }}@${{ steps.build.outputs.digest }}

      - name: Verify Signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ghcr.io/${{ steps.owner.outputs.name }}/secureflow-${{ matrix.service }}@${{ steps.build.outputs.digest }}