name: Container Scanning

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  trivy:
    name: Scan Image (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - transaction-service
          - frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Image
        run: |
          docker build -t secureflow/${{ matrix.service }}:scan \
            services/${{ matrix.service }}

      - name: Run Trivy (report, non-blocking)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: secureflow/${{ matrix.service }}:scan
          format: json
          output: trivy-${{ matrix.service }}.json
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: 0

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.json

      - name: Display Trivy Summary
        if: always()
        run: |
          echo "Trivy scan complete for ${{ matrix.service }}"
          echo "NOTE: Findings are intentional vulnerabilities; remediation pending"
          echo "Reports uploaded as artifacts for review"